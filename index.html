<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Eye Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    /* Loading message shown before WASM starts */
    #loading {
      position: absolute;
      color: #555;
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 0.1em;
    }
  </style>
  <!-- trunk replaces this link with the compiled WASM + JS glue -->
  <link data-trunk rel="rust" data-cargo-features="webgl2" data-wasm-opt="z" />
</head>
<body>
  <div id="loading">loading...</div>
  <script>
    // Hide loading text once the canvas appears
    const observer = new MutationObserver(() => {
      if (document.querySelector('canvas')) {
        document.getElementById('loading').style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
