<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- user-scalable=no prevents pinch-zoom interfering with touch controls -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Magic Eye Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      touch-action: none;
    }
    canvas { display: block; }
    #loading {
      position: absolute;
      color: #555;
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 0.1em;
    }
  </style>
  <!-- trunk replaces this link with the compiled WASM + JS glue -->
  <link data-trunk rel="rust" data-cargo-features="webgl2"
        data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int" />
</head>
<body>
  <div id="loading">loading...</div>
  <script>
    // Once the canvas appears, scale it to fill the viewport while preserving
    // its exact pixel aspect ratio (read from the canvas's own width/height
    // attributes set by Bevy). This avoids hardcoding any assumed ratio.
    const observer = new MutationObserver(() => {
      const canvas = document.querySelector('canvas');
      if (canvas) {
        document.getElementById('loading').style.display = 'none';
        const scale = Math.min(
          window.innerWidth  / canvas.width,
          window.innerHeight / canvas.height
        );
        canvas.style.width  = Math.round(canvas.width  * scale) + 'px';
        canvas.style.height = Math.round(canvas.height * scale) + 'px';
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
