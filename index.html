<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- user-scalable=no prevents pinch-zoom interfering with touch controls -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <!-- Fullscreen when added to iOS / Android home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Magic Eye Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      /* Prevent scroll / elastic bounce on iOS */
      touch-action: none;
    }
    canvas {
      /* Scale the fixed 400x800 canvas to fill the viewport,
         preserving the 1:2 aspect ratio. */
      width: min(100vw, 50vh);
      height: min(200vw, 100vh);
      display: block;
    }
    #loading {
      position: absolute;
      color: #555;
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 0.1em;
    }
  </style>
  <!-- trunk replaces this link with the compiled WASM + JS glue -->
  <link data-trunk rel="rust" data-cargo-features="webgl2"
        data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int" />
</head>
<body>
  <div id="loading">loading...</div>
  <script>
    // Hide loading text once the canvas appears
    const observer = new MutationObserver(() => {
      if (document.querySelector('canvas')) {
        document.getElementById('loading').style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // On first touch, request the browser fullscreen API (Android Chrome).
    // iOS ignores this but respects apple-mobile-web-app-capable above.
    document.addEventListener('touchstart', function requestFS() {
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }, { once: true });
  </script>
</body>
</html>
